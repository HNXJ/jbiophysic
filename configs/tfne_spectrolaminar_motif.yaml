# TFNE-Izhikevich Spectrolaminar Motif Configuration
#
# This YAML defines two execution modes for the three-area (V1→V4→PFC)
# laminar cortical network with TFNE forward-field readout.
#
# DOCTRINE NOTES:
# - Exploratory scaffold only. Not biological validation.
# - Izhikevich parameters are for tutorial purposes.
# - TFNE is a forward-field tool, not a biophysical simulator.
# - All outputs marked truth_safe_unverified.
# - Generated outputs are untracked (temporary).

# Base configuration (common to all modes)
mode: "smoke"
seed: 42
truth_mode: "truth_safe_unverified"

# Simulation timing (milliseconds)
dt_ms: 0.1
t_start_ms: 0.0
t_stop_ms: 5000.0
stimulus_onset_ms: 500.0
stimulus_duration_ms: 200.0
baseline_duration_ms: 500.0
post_duration_ms: 1000.0

# Population architecture
neurons_per_area_per_class:
  V1: 200
  V4: 200
  PFC: 200

cell_counts_by_class:
  E: 0.75
  PV: 0.10
  SST: 0.10
  VIP: 0.05

laminar_fractions:
  superficial: 0.35
  middle: 0.30
  deep: 0.35

laminar_depths_mm:
  superficial: [0.0, 0.5]
  middle: [0.5, 0.8]
  deep: [0.8, 1.5]

# Geometry (millimeters)
neuron_xy_radius_mm: 0.5
neuron_min_distance_um: 10.0

# Izhikevich and connectivity
izhikevich_param_preset: "regular_spiking"
connectivity_rule: "all_to_all"
connection_probability: 0.1

# TFNE field solver
tfne_conductivity_s_m: 0.3
tfne_jacobi_steps: 1000
tfne_residual_tol: 1.0e-6
tfne_boundary_condition: "neumann_zero"
tfne_gauge: "mean_zero"
tfne_contact_depths_mm: [0.0, 0.5, 1.0, 1.5]

# Dynamics
plasticity_coefficient: 0.1
noise_level_pA: 10.0

# Analysis and output
readout_objective: "spectrolaminar_alpha_gamma"
claim_level: "smoke_test"
source_calibration_status: "exploratory"

disclaimer: |
  EXPLORATORY SCAFFOLD ONLY. Not biological validation.
  Izhikevich native current, TFNE forward-field, computational.
  No head model. No biophysics guarantee.

output_save_spikes: true
output_save_rates: true
output_save_lfp: true
output_save_csd: true
output_save_field_snapshots: false
output_dir: "/tmp/spectrolaminar_output"

# Mode-specific overrides
modes:
  smoke:
    # Smoke mode: small, fast testing
    neurons_per_area_per_class:
      V1: 50
      V4: 50
      PFC: 50
    tfne_jacobi_steps: 100
    tfne_residual_tol: 1.0e-4
    claim_level: "smoke_test"
    output_save_field_snapshots: false
    t_stop_ms: 1000.0  # Shorter for faster tests

  full:
    # Full mode: intended production-size parameters
    neurons_per_area_per_class:
      V1: 200
      V4: 200
      PFC: 200
    tfne_jacobi_steps: 2000
    tfne_residual_tol: 1.0e-8
    claim_level: "computational"
    output_save_field_snapshots: true
    t_stop_ms: 5000.0
