name: Baseline Architecture Check

on:
  push:
    branches: [ main, arch-refactor, gemdev ]
  pull_request:
    branches: [ main ]

jobs:
  validate-imports:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install jbiophysic
      run: |
        pip install --upgrade pip
        pip install -e ".[dev,viz]"
        
    - name: Verify Architecture Imports
      run: |
        python -c "import jbiophysic.core; print('✅ Core Layer OK')"
        python -c "import jbiophysic.models; print('✅ Models Layer OK')"
        python -c "import jbiophysic.viz; print('✅ Viz Layer OK')"
        python -c "import jbiophysic.cli; print('✅ CLI Layer OK')"
        
    - name: Run Tiered Smoke Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/src
        pytest tests/