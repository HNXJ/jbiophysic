name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,jax]"
      - name: Parse pyproject
        run: |
          python - <<'PY'
          try:
              import tomllib
          except ModuleNotFoundError:
              import subprocess
              import sys
              subprocess.check_call([sys.executable, "-m", "pip", "install", "tomli"])
              import tomli as tomllib
          with open('pyproject.toml','rb') as f:
              print(tomllib.load(f)['project']['name'])
          PY
      - name: Lint
        run: ruff check src tests
      - name: Compile
        run: PYTHONPATH=src python -m compileall -q src tests
      - name: Test
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTHONPATH=src python -m pytest -q
